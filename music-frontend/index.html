<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <header class="header">
            <h1 class="app-title">🎵 Music Player</h1>
        </header>

        <main class="main-content">
            <div id="tracksList" class="tracks-list">
                <div class="loading">Загрузка...</div>
            </div>
        </main>

        <audio id="audioPlayer" style="display: none;"></audio>
        
        <div class="mini-player" id="miniPlayer" style="display: none;">
            <div class="mini-track-info">
                <span class="mini-title" id="miniTitle">Название</span>
                <span class="mini-artist" id="miniArtist">Исполнитель</span>
            </div>
            <button class="mini-play-pause" id="miniPlayPause" onclick="togglePlay()">▶</button>
        </div>
    </div>
    <script src="/script.js"></script>
</body>
</html>
